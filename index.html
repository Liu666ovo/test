<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>高级感转盘</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at top, #1c203b 0%, #0b0d17 100%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    max-width: 500px;
    width: 100%;
    text-align: center;
    padding: 20px;
}

.title {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 4px;
    margin-bottom: 30px;
    color: #d4af37;
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
}

/* ================= 转盘区域 ================= */

.wheel-container {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 0 auto 40px;
    perspective: 1000px; 
}

/* 外圈慢旋转装饰 - 优化渐变光泽 */
.wheel-frame {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    border: 3px solid transparent;
    background:
        linear-gradient(#0b0d17, #0b0d17) padding-box,
        linear-gradient(135deg, #d4af37, #f6e27a, #8e44ad, #2c3e50, #d4af37) border-box;
    background-size: 200% 200%;
    animation: rotateFrame 20s linear infinite, gradientShift 5s ease infinite;
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
    z-index: 1;
}

/* 转盘主体 */
.wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    background: #15172b;
    border: 6px solid rgba(255,255,255,0.1);
    box-shadow:
        0 20px 50px rgba(0,0,0,0.8),
        inset 0 0 40px rgba(0,0,0,0.9);
    transition: transform 5.5s cubic-bezier(0.15, 0.9, 0.3, 1);
    z-index: 2;
}

/* 新增：旋转时的扫光效果 */
.wheel::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
    transform: rotate(0deg);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
}
.wheel.spinning::after {
    opacity: 1;
    animation: shineScan 1s linear infinite;
}

/* 扇形优化 */
.segment {
    position: absolute;
    width: 50%;
    height: 50%;
    transform-origin: bottom right;
    left: 0;
    top: 0;
    clip-path: polygon(0 0, 100% 0, 100% 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent; 
    border-right: 1px solid rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(0,0,0,0.2);
}

/* 中心圆 - 升级为金属按钮质感 */
.wheel-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
    border: 4px solid #fff;
    box-shadow:
        0 0 30px rgba(255,215,0,0.6),
        inset 0 0 15px rgba(0,0,0,0.4),
        0 10px 20px rgba(0,0,0,0.5);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    transition: transform 0.2s;
}

.wheel-center:active {
    transform: translate(-50%, -50%) scale(0.95);
}

/* 指针优化 - 增加悬停微动 */
.pointer {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 65px;
    z-index: 20;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
    animation: hoverTick 2s ease-in-out infinite;
}

.pointer-main {
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #ffffff 0%, #ff6b6b 40%, #8b0000 100%);
    clip-path: polygon(50% 0%, 35% 60%, 40% 100%, 60% 100%, 65% 60%);
}

.pointer-dot {
    position: absolute;
    bottom: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff, #ccc);
    box-shadow: 0 0 10px rgba(255,255,255,0.6);
    border: 2px solid #8b0000;
}

/* ================= 按钮 & 结果 ================= */

.spin-btn {
    background: linear-gradient(145deg, #d4af37, #b8860b);
    color: #111;
    border: none;
    padding: 16px 60px;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: 2px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(212,175,55,0.4), inset 0 2px 5px rgba(255,255,255,0.4);
    transition: all 0.3s ease;
    text-transform: uppercase;
    touch-action: manipulation;
}

.spin-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(212,175,55,0.6);
}

.spin-btn:active {
    transform: translateY(1px);
}

.spin-btn:disabled {
    filter: grayscale(0.8);
    cursor: not-allowed;
    transform: none;
}

.result-panel {
    margin-top: 30px;
    display: none;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s ease;
}

.result-panel.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

.result-content {
    font-size: 2.2rem;
    font-weight: 800;
    color: #ffd700;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    letter-spacing: 2px;
}

/* 隐藏网站链接 */
.result-link {
    display: none;
}

.jump-btn {
    margin-top: 10px;
    padding: 12px 45px;
    border-radius: 40px;
    border: none;
    background: linear-gradient(135deg, #4ecdc4, #44a08d);
    color: #fff;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
    transition: transform 0.2s;
    touch-action: manipulation;
}

.jump-btn:hover {
    transform: scale(1.05);
}

/* ================= 动画定义 ================= */

@keyframes rotateFrame {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

@keyframes hoverTick {
    0%, 100% { transform: translateX(-50%) rotate(-2deg); }
    50% { transform: translateX(-50%) rotate(2deg); }
}

@keyframes shineScan {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>
<div class="container">
    <h1 class="title">LUCKY SPIN</h1>

    <div class="wheel-container">
        <div class="wheel-frame"></div>

        <div class="pointer">
            <div class="pointer-main"></div>
            <div class="pointer-dot"></div>
        </div>

        <div class="wheel" id="wheel">
        </div>
        
        <div class="wheel-center">🎯</div>
    </div>

    <button class="spin-btn" id="spin-btn">开始旋转</button>

    <div class="result-panel" id="result-panel">
        <div class="result-content" id="result-content">...</div>
        <div class="result-link" id="result-link"></div>
        <button class="jump-btn" id="jump-btn">立即播放</button>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spin-btn');
    const resultPanel = document.getElementById('result-panel');
    const resultContent = document.getElementById('result-content');
    const jumpBtn = document.getElementById('jump-btn');

    const websiteLinks = [
        'https://v.douyin.com/r63-zGkAGMY/',
        'https://v.douyin.com/DOWCAd3r5o8/',
        'https://v.douyin.com/rlxbgpT-s1k/',
        'https://v.douyin.com/gwVQ4NQf3RQ/',
        'https://v.douyin.com/yE42tSJTgnE/',
        'https://v.douyin.com/r63-zGkAGMY/'
    ];

    const names = ['神秘歌曲一', '神秘歌曲二', '神秘歌曲三', '神秘歌曲四', '神秘歌曲五', '神秘歌曲六'];
    
    const colors = ['#ff6b6b', '#4ecdc4', '#f6c453', '#c39bd3', '#48c9b0', '#ff8e53'];

    let rotation = 0;
    let spinning = false;
    let currentLink = '';

    const segmentAngle = 360 / 6;
    
    for (let i = 0; i < 6; i++) {
        const seg = document.createElement('div');
        seg.className = 'segment';
        
        const rotateDeg = i * segmentAngle;
        
        seg.style.backgroundColor = colors[i];
        seg.style.transform = `rotate(${rotateDeg}deg) skewY(-${90 - segmentAngle}deg)`;
        
        wheel.appendChild(seg);
    }

    spinBtn.onclick = (e) => {
        e.preventDefault();
        if (spinning) return;
        spinning = true;
        spinBtn.disabled = true;
        resultPanel.classList.remove('show');
        
        wheel.classList.add('spinning');

        const index = Math.floor(Math.random() * 6);
        const extraRounds = 5 + Math.floor(Math.random() * 3); 
        
        const segmentAngle = 360 / 6;
        const targetRotation = rotation + (360 * extraRounds) + (360 - (index * segmentAngle)) - (segmentAngle/2);
        
        rotation = targetRotation; 
        
        wheel.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            spinning = false;
            spinBtn.disabled = false;
            wheel.classList.remove('spinning');
            
            resultContent.textContent = names[index];
            currentLink = websiteLinks[index];
            resultPanel.classList.add('show');
        }, 5500);
    };

    jumpBtn.onclick = (e) => {
        e.preventDefault();
        if (currentLink) window.open(currentLink);
    };
});
</script>
</body>
</html>
