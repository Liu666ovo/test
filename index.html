<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>潮玩抽奖卡</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

/* iOS 核心修复：禁止系统默认滚动回弹 */
html {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-overflow-scrolling: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at top, #1c203b 0%, #0b0d17 100%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 
            env(safe-area-inset-bottom) env(safe-area-inset-left);
}

.container {
    max-width: 450px;
    width: 100%;
    text-align: center;
}

.title {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 4px;
    margin-bottom: 40px;
    color: #d4af37;
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
}

/* 抽奖卡片核心样式 */
.lucky-card {
    width: 100%;
    height: 380px;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: #15172b;
    border: 4px solid transparent;
    background-clip: padding-box;
    box-shadow: 
        0 20px 60px rgba(0,0,0,0.8),
        inset 0 0 30px rgba(0,0,0,0.9);
    margin-bottom: 40px;
    transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
}

/* 卡片渐变边框 */
.lucky-card::before {
    content: '';
    position: absolute;
    top: -4px;
    left: -4px;
    right: -4px;
    bottom: -4px;
    background: linear-gradient(135deg, #d4af37, #f6e27a, #8e44ad, #2c3e50, #d4af37);
    background-size: 200% 200%;
    border-radius: 20px;
    z-index: -1;
    animation: gradientShift 5s ease infinite;
}

/* 卡片内容区 */
.card-content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

.card-icon {
    font-size: 6rem;
    margin-bottom: 20px;
    transition: transform 0.5s ease;
}

.card-text {
    font-size: 1.8rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    transition: all 0.5s ease;
}

/* 卡片点击动效 */
.lucky-card.clicked {
    transform: scale(0.98);
    box-shadow: 
        0 15px 40px rgba(0,0,0,0.9),
        inset 0 0 40px rgba(0,0,0,0.9);
}

.lucky-card.clicked .card-icon {
    transform: rotate(15deg) scale(1.1);
    filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8));
}

/* 结果面板 */
.result-panel {
    margin-top: 20px;
    display: none;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s ease;
}

.result-panel.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

.result-content {
    font-size: 2.2rem;
    font-weight: 800;
    color: #ffd700;
    margin-bottom: 15px;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    letter-spacing: 2px;
}

/* 隐藏链接 */
.result-link {
    display: none;
}

/* 按钮样式 */
.jump-btn {
    padding: 14px 50px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #d4af37, #b8860b);
    color: #111;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(212,175,55,0.4), inset 0 2px 5px rgba(255,255,255,0.4);
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 2px;
    -webkit-appearance: none;
    appearance: none;
}

.jump-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(212,175,55,0.6);
}

.jump-btn:active {
    transform: translateY(1px);
}

/* 动画定义 */
@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

/* 加载动画 */
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

.loading {
    animation: pulse 1.5s ease infinite;
}
</style>
</head>

<body>
<div class="container">
    <h1 class="title">LUCKY DRAW</h1>

    <!-- 抽奖卡片 -->
    <div class="lucky-card" id="luckyCard">
        <div class="card-content">
            <div class="card-icon" id="cardIcon">🎵</div>
            <div class="card-text" id="cardText">点击抽街头好歌</div>
        </div>
    </div>

    <!-- 结果面板 -->
    <div class="result-panel" id="resultPanel">
        <div class="result-content" id="resultContent">...</div>
        <div class="result-link" id="resultLink"></div>
        <button class="jump-btn" id="jumpBtn">立即播放</button>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const luckyCard = document.getElementById('luckyCard');
    const cardIcon = document.getElementById('cardIcon');
    const cardText = document.getElementById('cardText');
    const resultPanel = document.getElementById('resultPanel');
    const resultContent = document.getElementById('resultContent');
    const jumpBtn = document.getElementById('jumpBtn');

    // 街头视频链接列表
    const websiteLinks = [
        'https://v.douyin.com/r63-zGkAGMY/',
        'https://v.douyin.com/DOWCAd3r5o8/',
        'https://v.douyin.com/rlxbgpT-s1k/',
        'https://v.douyin.com/gwVQ4NQf3RQ/',
        'https://v.douyin.com/yE42tSJTgnE/',
        'https://v.douyin.com/r63-zGkAGMY/'
    ];

    // 奖品/歌曲名称
    const names = ['神秘歌曲一', '神秘歌曲二', '神秘歌曲三', '神秘歌曲四', '神秘歌曲五', '神秘歌曲六'];
    
    // 卡片图标集合
    const icons = ['🎵', '🎶', '🔥', '🎧', '💥', '✨'];
    
    let currentLink = '';
    let isDrawing = false;

    // iOS 点击优先使用 touch 事件，解决延迟
    luckyCard.addEventListener('touchend', (e) => {
        e.preventDefault();
        startDraw();
    });

    luckyCard.addEventListener('click', startDraw);

    function startDraw() {
        if (isDrawing) return;
        isDrawing = true;
        
        // 重置结果面板
        resultPanel.classList.remove('show');
        
        // 点击动效
        luckyCard.classList.add('clicked');
        cardText.textContent = '正在抽取...';
        cardText.classList.add('loading');
        
        // 随机切换图标（模拟抽奖动画）
        let iconIndex = 0;
        const iconInterval = setInterval(() => {
            cardIcon.textContent = icons[iconIndex % icons.length];
            iconIndex++;
        }, 100);

        // 抽奖延迟（模拟加载）
        setTimeout(() => {
            clearInterval(iconInterval);
            luckyCard.classList.remove('clicked');
            cardText.classList.remove('loading');
            
            // 随机选结果
            const randomIndex = Math.floor(Math.random() * 6);
            currentLink = websiteLinks[randomIndex];
            
            // 更新卡片和结果
            cardIcon.textContent = icons[randomIndex];
            cardText.textContent = '点击再抽一次';
            resultContent.textContent = names[randomIndex];
            resultPanel.classList.add('show');
            
            isDrawing = false;
        }, 1800);
    }

    // 跳转按钮逻辑
    jumpBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (currentLink) {
            window.open(currentLink, '_blank');
        }
    });
});
</script>
</body>
</html>
